services:
  tree-education-ioas-fronted:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://ioasbackend.ldbbd.com/api/v1}
        VITE_API_ROOT_URL: ${VITE_API_ROOT_URL:-https://ioasbackend.ldbbd.com/api}
        VITE_UPLOAD_MAX_CONCURRENT_TASKS: ${VITE_UPLOAD_MAX_CONCURRENT_TASKS:-2}
    container_name: tree-education-ioas-fronted
    ports:
      - "18081:80"
    restart: always
    networks:
      - ioas-network

networks:
  ioas-network:
    external: true
    name: tree-education-ioas_ioas-network
